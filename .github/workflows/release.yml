name: Build and publish release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: npm run check

      - name: Validate release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          if ($packageVersion -ne $tagVersion) {
            throw "package.json version $packageVersion does not match tag $tagVersion."
          }

      - name: Build Windows installer
        run: npm run build

      - name: Verify release files
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = "dist/KnowledgeReview-$version-Setup.exe"
          Get-ChildItem dist -File | Format-Table Name,Length
          if (-not (Test-Path $installer)) {
            throw 'Windows installer was not generated.'
          }
          $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $installer))
          $hash = [System.Security.Cryptography.SHA512]::Create().ComputeHash($bytes)
          $sha512 = [Convert]::ToBase64String($hash)
          $size = (Get-Item $installer).Length
          $releaseDate = (Get-Date).ToUniversalTime().ToString('o')
          @("version: $version", 'files:', "  - url: KnowledgeReview-$version-Setup.exe", "    sha512: $sha512", "    size: $size", "path: KnowledgeReview-$version-Setup.exe", "sha512: $sha512", "releaseDate: $releaseDate") | Set-Content -Path 'dist/latest.yml' -Encoding utf8
          if (-not (Test-Path 'dist/latest.yml')) { throw 'latest.yml was not generated.' }

      - name: Create draft GitHub Release
        shell: pwsh
        run: |
          gh release view "${{ github.ref_name }}" --json isDraft *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --draft --verify-tag --title "${{ github.ref_name }}" --generate-notes
          } else {
            gh release edit "${{ github.ref_name }}" --draft=true
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          gh release upload "${{ github.ref_name }}" `
            "dist/KnowledgeReview-$version-Setup.exe" `
            "dist/KnowledgeReview-$version-Setup.exe.blockmap" `
            'dist/latest.yml' `
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release assets
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $release = gh release view "${{ github.ref_name }}" --json isDraft,assets | ConvertFrom-Json
          $expected = @(
            "KnowledgeReview-$version-Setup.exe",
            "KnowledgeReview-$version-Setup.exe.blockmap",
            'latest.yml'
          )
          $actual = @($release.assets | ForEach-Object name)
          foreach ($name in $expected) {
            if ($actual -notcontains $name) { throw "Missing release asset: $name" }
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish verified release
        shell: pwsh
        run: gh release edit "${{ github.ref_name }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Gitee release
        if: ${{ env.GITEE_TOKEN != '' }}
        shell: pwsh
        run: |
          $owner = 'shenxiao233'
          $repo = 'knowledge-review-electron'
          $tag = '${{ github.ref_name }}'
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $api = "https://gitee.com/api/v5/repos/$owner/$repo"
          $headers = @{ Accept = 'application/json'; 'User-Agent' = 'KnowledgeReview-Release' }
          $query = "access_token=$env:GITEE_TOKEN"
          $release = $null
          try {
            $release = Invoke-RestMethod -Headers $headers -Uri "$api/releases/tags/$tag`?$query"
          } catch {
            $body = @{ tag_name = $tag; name = $tag; target_commitish = 'main'; body = "KnowledgeReview $tag"; prerelease = $false } | ConvertTo-Json
            $release = Invoke-RestMethod -Method Post -Headers $headers -ContentType 'application/json' -Body $body -Uri "$api/releases`?$query"
          }
          $assets = @(
            "dist/KnowledgeReview-$version-Setup.exe.blockmap",
            'dist/latest.yml',
            "dist/KnowledgeReview-$version-Setup.exe"
          )
          foreach ($asset in $assets) {
            $file = Resolve-Path $asset
            $existing = @($release.assets | Where-Object { $_.name -eq (Split-Path $asset -Leaf) })
            foreach ($item in $existing) {
              Invoke-RestMethod -Method Delete -Headers $headers -Uri "$api/releases/$($release.id)/attach_files/$($item.id)`?$query"
            }
            $uploaded = $false
            for ($attempt = 1; $attempt -le 5 -and -not $uploaded; $attempt++) {
              Write-Host "Uploading $(Split-Path $asset -Leaf), attempt $attempt/5"
              curl.exe --fail-with-body --location --retry 5 --retry-all-errors --retry-delay 10 --connect-timeout 60 --max-time 3600 --speed-limit 1024 --speed-time 300 -X POST "$api/releases/$($release.id)/attach_files`?$query" -F "file=@$file"
              if ($LASTEXITCODE -eq 0) { $uploaded = $true } else { Start-Sleep -Seconds ([Math]::Min(60, $attempt * 10)) }
            }
            if (-not $uploaded) { throw "Failed to upload $(Split-Path $asset -Leaf) to Gitee." }
          }
