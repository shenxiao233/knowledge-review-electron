name: Build and publish release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: npm run check

      - name: Build Windows installer
        run: npm run build

      - name: Verify release files
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = "dist/KnowledgeReview-$version-Setup.exe"
          Get-ChildItem dist -File | Format-Table Name,Length
          if (-not (Test-Path $installer)) {
            throw 'Windows installer was not generated.'
          }
          $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $installer))
          $hash = [System.Security.Cryptography.SHA512]::Create().ComputeHash($bytes)
          $sha512 = [Convert]::ToBase64String($hash)
          $size = (Get-Item $installer).Length
          $releaseDate = (Get-Date).ToUniversalTime().ToString('o')
          @("version: $version", 'files:', "  - url: KnowledgeReview-$version-Setup.exe", "    sha512: $sha512", "    size: $size", "path: KnowledgeReview-$version-Setup.exe", "sha512: $sha512", "releaseDate: $releaseDate") | Set-Content -Path 'dist/latest.yml' -Encoding utf8
          if (-not (Test-Path 'dist/latest.yml')) { throw 'latest.yml was not generated.' }

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/KnowledgeReview-*-Setup.exe
            dist/KnowledgeReview-*-Setup.exe.blockmap
            dist/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
