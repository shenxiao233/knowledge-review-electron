name: Build and publish release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: npm run check

      - name: Validate release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          if ($packageVersion -ne $tagVersion) {
            throw "package.json version $packageVersion does not match tag $tagVersion."
          }

      - name: Build Windows installer
        run: npm run build

      - name: Verify release files
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = "dist/NotionCard-$version-Setup.exe"
          Get-ChildItem dist -File | Format-Table Name,Length
          if (-not (Test-Path $installer)) {
            throw 'Windows installer was not generated.'
          }
          $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $installer))
          $hash = [System.Security.Cryptography.SHA512]::Create().ComputeHash($bytes)
          $sha512 = [Convert]::ToBase64String($hash)
          $size = (Get-Item $installer).Length
          $releaseDate = (Get-Date).ToUniversalTime().ToString('o')
          @("version: $version", 'files:', "  - url: NotionCard-$version-Setup.exe", "    sha512: $sha512", "    size: $size", "path: NotionCard-$version-Setup.exe", "sha512: $sha512", "releaseDate: $releaseDate") | Set-Content -Path 'dist/latest.yml' -Encoding utf8
          if (-not (Test-Path 'dist/latest.yml')) { throw 'latest.yml was not generated.' }

      - name: Create draft GitHub Release
        shell: pwsh
        run: |
          gh release view "${{ github.ref_name }}" --json isDraft *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --draft --verify-tag --title "${{ github.ref_name }}" --generate-notes
          } else {
            gh release edit "${{ github.ref_name }}" --draft=true
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          gh release upload "${{ github.ref_name }}" `
            "dist/NotionCard-$version-Setup.exe" `
            "dist/NotionCard-$version-Setup.exe.blockmap" `
            'dist/latest.yml' `
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release assets
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $release = gh release view "${{ github.ref_name }}" --json isDraft,assets | ConvertFrom-Json
          $expected = @(
            "NotionCard-$version-Setup.exe",
            "NotionCard-$version-Setup.exe.blockmap",
            'latest.yml'
          )
          $actual = @($release.assets | ForEach-Object name)
          foreach ($name in $expected) {
            if ($actual -notcontains $name) { throw "Missing release asset: $name" }
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish verified release
        shell: pwsh
        run: gh release edit "${{ github.ref_name }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
