services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: market
      POSTGRES_USER: market
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-market_password}
    volumes:
      - market-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d market"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - market-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  market-db:
  market-storage:
