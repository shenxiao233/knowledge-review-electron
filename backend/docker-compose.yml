services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Reuse the existing PostgreSQL container published on the host.
      # Inside Docker, 127.0.0.1 would point back to the API container.
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-yang12345}@host.docker.internal:5432/${POSTGRES_DB:-mydb}?schema=public}
      STORAGE_DIR: /app/storage
    ports:
      - "${API_PORT:-4000}:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${HOST_STORAGE_DIR:-./storage}:/app/storage"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
